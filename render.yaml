services:
  # 1. AI SERVICE (Python FastAPI)
  - type: web
    name: tutobuddy-ai
    env: python
    rootDir: ai-services
    plan: free # Changed from starter to avoid payment prompt
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python -m spacy download en_core_web_sm && python -c 'import nltk; nltk.download(\"wordnet\"); nltk.download(\"omw-1.4\"); nltk.download(\"punkt\"); nltk.download(\"averaged_perceptron_tagger\")'"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: PIP_NO_CACHE_DIR
        value: "1"

  # 2. BACKEND API (Node.js Express)
  - type: web
    name: tutobuddy-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    startCommand: "npm start"
    envVars:
      - key: AI_SERVICE_URL
        sync: false # Set to the public URL of tutobuddy-ai after first deploy
      - key: APPWRITE_ENDPOINT
        sync: false # Set this in the Render Dashboard
      - key: APPWRITE_PROJECT_ID
        sync: false
      - key: APPWRITE_DATABASE_ID
        sync: false
      - key: APPWRITE_STORAGE_ID
        sync: false
      - key: APPWRITE_API_KEY
        sync: false

  # 3. FRONTEND (Next.js)
  - type: web
    name: tutobuddy-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set to the public URL of tutobuddy-backend after first deploy
      - key: NEXT_PUBLIC_APPWRITE_ENDPOINT
        sync: false
      - key: NEXT_PUBLIC_APPWRITE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_APPWRITE_DATABASE_ID
        sync: false
      - key: NEXT_PUBLIC_APPWRITE_STORAGE_ID
        sync: false
